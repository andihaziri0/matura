name: matura

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: matura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: matura
      POSTGRES_PASSWORD: matura
      POSTGRES_DB: matura
    ports:
      - '5432:5432'
    volumes:
      - matura-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U matura -d matura']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: matura-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - matura-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: matura-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: matura
      MINIO_ROOT_PASSWORD: matura-secret
    command: server /data --console-address ':9001'
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - matura-minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: matura-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 matura matura-secret &&
      mc mb --ignore-existing local/matura-content &&
      mc anonymous set download local/matura-content &&
      echo 'minio bucket matura-content ready'
      "
    restart: 'no'

volumes:
  matura-postgres-data:
  matura-redis-data:
  matura-minio-data:
